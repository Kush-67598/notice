<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Notice Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .modal {
            transition: opacity 0.25s ease;
        }

        body.modal-active {
            overflow-x: hidden;
            overflow-y: visible !important;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <!-- Sidebar / Topbar -->
    <nav class="bg-indigo-700 shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center text-white">
                    <span class="text-2xl font-bold">Admin Panel</span>
                </div>
                <div class="flex items-center space-x-6">
                    <span id="adminName" class="text-indigo-100 font-medium">Admin</span>
                    <button id="logoutBtn"
                        class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors">Logout</button>
                    <a href="/" class="text-white hover:text-indigo-100 text-sm font-medium">View Website</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Manage Notices</h1>
                <p class="text-gray-500">Create, edit and delete college notices.</p>
            </div>
            <button id="addNoticeBtn"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-indigo-200 transition-all transform hover:scale-105 flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
                Post New Notice
            </button>
        </div>

        <!-- Dashboard Stats or Info -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm font-medium text-gray-500 mb-1">Total Notices</p>
                <h3 id="totalNotices" class="text-3xl font-extrabold text-indigo-600">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm font-medium text-gray-500 mb-1">Last Update</p>
                <h3 id="lastUpdate" class="text-lg font-bold text-gray-800">No data</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-sm font-medium text-gray-500 mb-1">Admin Session</p>
                <h3 class="text-lg font-bold text-green-600 flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                    Active
                </h3>
            </div>
        </div>

        <!-- Notices Table -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col"
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                Date</th>
                            <th scope="col"
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                Title</th>
                            <th scope="col"
                                class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                Attachment</th>
                            <th scope="col"
                                class="px-6 py-4 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody id="noticesList" class="bg-white divide-y divide-gray-200">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>

            <!-- Table Empty State -->
            <div id="tableEmptyState"
                class="hidden flex flex-col items-center justify-center py-20 grayscale opacity-50">
                <p class="text-gray-500 font-medium">No notices found in database.</p>
            </div>

            <!-- Table Loading State -->
            <div id="tableLoadingState" class="flex flex-col items-center justify-center py-20 grayscale opacity-50">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mb-2"></div>
                <p class="text-gray-500 font-medium text-sm">Loading...</p>
            </div>
        </div>
    </main>

    <!-- Notice Modal (Add/Edit) -->
    <div id="noticeModal" class="modal fixed inset-0 z-50 overflow-y-auto hidden">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity" aria-hidden="true">
                <div class="absolute inset-0 bg-gray-900 opacity-75"></div>
            </div>

            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <div
                class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">
                <form id="noticeForm" enctype="multipart/form-data">
                    <input type="hidden" id="noticeId">
                    <div class="bg-white px-8 pt-8 pb-4">
                        <div class="mb-6 flex justify-between items-center border-b border-gray-100 pb-4">
                            <h3 id="modalTitle" class="text-2xl font-bold text-gray-900">Post New Notice</h3>
                            <button type="button" id="closeModal" class="text-gray-400 hover:text-gray-500 p-2">
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>

                        <div class="space-y-5">
                            <div>
                                <label for="title" class="block text-sm font-semibold text-gray-700 mb-1">Title</label>
                                <input type="text" id="title" name="title" required
                                    class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                            </div>

                            <div>
                                <label for="description"
                                    class="block text-sm font-semibold text-gray-700 mb-1">Description</label>
                                <textarea id="description" name="description" rows="5" required
                                    class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"></textarea>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label for="date" class="block text-sm font-semibold text-gray-700 mb-1">Custom Date
                                        (optional)</label>
                                    <input type="date" id="date" name="date"
                                        class="block w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                                </div>
                                <div>
                                    <label for="attachment"
                                        class="block text-sm font-semibold text-gray-700 mb-1">Attachment
                                        (PDF/Image)</label>
                                    <input type="file" id="attachment" name="attachment"
                                        class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-gray-50 px-8 py-6 flex flex-row-reverse space-x-reverse space-x-3">
                        <button type="submit"
                            class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-sm px-6 py-3 bg-indigo-600 text-base font-bold text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:w-auto transition-colors">
                            Save Changes
                        </button>
                        <button type="button" id="cancelModal"
                            class="w-full inline-flex justify-center rounded-xl border border-gray-300 shadow-sm px-6 py-3 bg-white text-base font-semibold text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:w-auto transition-colors">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast"
        class="fixed bottom-5 right-5 z-[60] bg-gray-900 border border-gray-800 text-white px-6 py-4 rounded-2xl shadow-2xl shadow-indigo-900/20 transform translate-y-20 opacity-0 transition-all duration-300 flex items-center">
        <span id="toastMessage"></span>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/admin.js"></script>
</body>

</html>
